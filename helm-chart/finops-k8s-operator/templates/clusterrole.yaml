{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "finops-k8s-operator.fullname" . }}
# NOTE: this ClusterRole grants permissions cluster‑wide.  Kubernetes RBAC
# doesn’t have a way to say “grant this role except in kube‑system”, so we
# can’t really restrict the perms via the RoleBinding itself.  instead, the
# operator’s timer handler internally skips any namespace whose name starts
# with "kube-" or is one of the well‑known control‑plane namespaces.  the
# README documents this behaviour so auditors are aware.
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "patch"]
  # CRD discovery: Kopf attempts to list available resource types at
  # startup to understand the API surface. Grant minimal listing permissions
  # to avoid permission errors (the operator won't directly manage CRDs).
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
{{- end -}}
