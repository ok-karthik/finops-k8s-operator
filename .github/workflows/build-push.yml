name: Build and Push to GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'  # Only build on version tags (e.g., v0.1.0)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # -- Helm chart packaging & push ----------------------------------
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.0

      # bump chart version when building for a git tag
      - name: Sync Chart.yaml version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -i "s/^version:.*/version: $VERSION/" helm-chart/finops-k8s-operator/Chart.yaml
          git diff helm-chart/finops-k8s-operator/Chart.yaml || true

      - name: Commit version bump
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git commit -am "chore: sync chart version to $VERSION [skip ci]" || true
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm chart
        run: |
          helm lint helm-chart/finops-k8s-operator
          helm package helm-chart/finops-k8s-operator

      - name: Push Helm chart to OCI registry
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REPO: ${{ github.actor }}/helm-charts      # new base path
        run: |
          helm registry login $REGISTRY --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }}
          helm push finops-k8s-operator-*.tgz oci://$REGISTRY/$REPO
