name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # --- BUILD AND PUBLISH ---
      # This block ONLY executes when a Release PR is merged.
      
      - name: Checkout code
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get clean version
        if: ${{ steps.release.outputs.release_created }}
        id: version
        run: |
          TAG="${{ steps.release.outputs.tag_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        if: ${{ steps.release.outputs.release_created }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.VERSION }}

      - name: Build and push Docker
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Set up Helm
        if: ${{ steps.release.outputs.release_created }}
        uses: azure/setup-helm@v3
        with:
          version: v3.12.0

      - name: Package Helm chart
        if: ${{ steps.release.outputs.release_created }}
        run: |
          helm lint helm-chart/finops-k8s-operator
          helm package helm-chart/finops-k8s-operator

      - name: Push Helm chart to OCI registry
        if: ${{ steps.release.outputs.release_created }}
        env:
          REGISTRY: ghcr.io
          REPO: ${{ github.actor }}/helm-charts
        run: |
          helm registry login $REGISTRY --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }}
          helm push finops-k8s-operator-*.tgz oci://$REGISTRY/$REPO
